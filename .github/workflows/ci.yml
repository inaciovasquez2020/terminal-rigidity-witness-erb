name: terminal-rigidity-witness-erb-sanity

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

- name: Sanity checks
  run: |
    set -euo pipefail
    cd "$GITHUB_WORKSPACE"
    test -f README.md
    test -f STATUS.md
    test -f FREEZE.md
    test -f trw-erb-sigc.tex
    test -f CITATION.cff
    echo "Sanity checks passed"

